name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev + api)
        run: python -m pip install -e ".[dev,api]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - name: Deterministic benchmark generation
        run: anchorprune pack --out /tmp/bench --window 2

      - name: Real-eval mock smoke (offline)
        run: >
          anchorprune real-eval --provider mock --model mock-deterministic
          --scenarios coding_agent --trials 1 --out /tmp/real_eval_smoke

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install -e ".[build]"
      - name: Build sdist + wheel
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      - name: Verify wheel installs and imports
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/python -c "import anchorprune; print(anchorprune.__version__)"

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        # Use install (not ci): optional native deps (@emnapi/*) resolve
        # per-platform, so a macOS-generated lockfile can mismatch the Linux
        # runner under the strict `npm ci` match.
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
