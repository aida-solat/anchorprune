<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.35" r="0.55">
      <stop offset="0" stop-color="#1b2a4a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1b2435"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Graph motif: anchors -> milestone -> payload (some quarantined) -->
  <g stroke-width="2" fill="none" opacity="0.85">
    <path d="M905 188 C 985 188, 985 322, 1065 322" stroke="#f87171"/>
    <path d="M905 264 C 985 264, 985 322, 1065 322" stroke="#fbbf24"/>
    <path d="M905 340 C 985 340, 985 322, 1065 322" stroke="#60a5fa"/>
    <path d="M1085 322 C 1140 322, 1140 230, 1188 230" stroke="#34d399"/>
    <path d="M1085 322 C 1140 322, 1140 414, 1188 414" stroke="#3b82f6"/>
    <path d="M1085 322 C 1140 322, 1140 496, 1188 496" stroke="#fb7185" stroke-dasharray="6 6"/>
  </g>

  <!-- anchor nodes -->
  <g>
    <rect x="812" y="166" width="96" height="44" rx="9" fill="#131a2b" stroke="#f87171" stroke-width="2"/>
    <rect x="812" y="242" width="96" height="44" rx="9" fill="#131a2b" stroke="#fbbf24" stroke-width="2"/>
    <rect x="812" y="318" width="96" height="44" rx="9" fill="#131a2b" stroke="#60a5fa" stroke-width="2"/>
  </g>
  <!-- milestone node -->
  <rect x="1042" y="300" width="50" height="44" rx="9" fill="#131a2b" stroke="#34d399" stroke-width="2"/>
  <!-- payload nodes -->
  <rect x="1184" y="208" width="84" height="44" rx="9" fill="#131a2b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="1184" y="392" width="84" height="44" rx="9" fill="#131a2b" stroke="#3b82f6" stroke-width="2"/>
  <!-- quarantined payload -->
  <g>
    <rect x="1184" y="474" width="84" height="44" rx="9" fill="#1a1220" stroke="#fb7185" stroke-width="2"/>
    <line x1="1192" y1="482" x2="1260" y2="510" stroke="#fb7185" stroke-width="2"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(96,96)">
    <circle cx="13" cy="13" r="13" fill="none" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="13" cy="13" r="4" fill="#60a5fa"/>
    <text x="40" y="20" fill="#8a97ad" font-size="22" font-weight="700" letter-spacing="4">ANCHORPRUNE</text>
  </g>

  <!-- Headline -->
  <text x="96" y="270" fill="#e6edf7" font-size="76" font-weight="800" letter-spacing="-1">Governed-State Runtime</text>
  <text x="96" y="352" fill="#e6edf7" font-size="76" font-weight="800" letter-spacing="-1">for Long-Running AI Agents</text>

  <!-- Tagline -->
  <text x="98" y="430" fill="#60a5fa" font-size="30" font-weight="600">Does not make models smarter.</text>
  <text x="98" y="472" fill="#34d399" font-size="30" font-weight="600">It governs what reaches them.</text>

  <!-- Footer chips -->
  <g font-size="20" font-weight="600">
    <rect x="96" y="528" width="190" height="40" rx="20" fill="#131a2b" stroke="#27324a"/>
    <text x="116" y="554" fill="#cdd7e6">v1.1.0 · stable</text>
    <rect x="302" y="528" width="150" height="40" rx="20" fill="#131a2b" stroke="#27324a"/>
    <text x="322" y="554" fill="#cdd7e6">Apache-2.0</text>
    <rect x="468" y="528" width="240" height="40" rx="20" fill="#131a2b" stroke="#27324a"/>
    <text x="488" y="554" fill="#cdd7e6">application-layer pruning</text>
  </g>
</svg>
